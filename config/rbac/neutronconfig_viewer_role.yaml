# This rule is not used by the project ovs-cni-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to openstack.humanz.moe resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ovs-cni-controller
    app.kubernetes.io/managed-by: kustomize
  name: neutronconfig-viewer-role
rules:
- apiGroups:
  - openstack.humanz.moe
  resources:
  - neutronconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - openstack.humanz.moe
  resources:
  - neutronconfigs/status
  verbs:
  - get
