# This rule is not used by the project ovs-cni-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over openstack.humanz.moe.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ovs-cni-controller
    app.kubernetes.io/managed-by: kustomize
  name: neutronipaddress-admin-role
rules:
- apiGroups:
  - openstack.humanz.moe
  resources:
  - neutronipaddresses
  verbs:
  - '*'
- apiGroups:
  - openstack.humanz.moe
  resources:
  - neutronipaddresses/status
  verbs:
  - get
