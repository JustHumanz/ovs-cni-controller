# This rule is not used by the project ovs-cni-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the openstack.humanz.moe.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ovs-cni-controller
    app.kubernetes.io/managed-by: kustomize
  name: neutronipaddress-editor-role
rules:
- apiGroups:
  - openstack.humanz.moe
  resources:
  - neutronipaddresses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - openstack.humanz.moe
  resources:
  - neutronipaddresses/status
  verbs:
  - get
